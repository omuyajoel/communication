<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLI | The Speaker Leadership Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --gold: #d4af37;
            --white: #ffffff;
            --accent: #38bdf8;
            --text-gray: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--slate-900);
            color: var(--white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .discovery-container {
            background: var(--slate-800);
            width: 100%;
            max-width: 800px;
            border-radius: 2px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 60px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Branding */
        .sli-logo {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 40px;
            display: block;
            text-align: center;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; line-height: 1.2; margin-bottom: 10px; text-align: center; }
        .subtitle { color: var(--text-gray); text-align: center; margin-bottom: 50px; font-weight: 300; letter-spacing: 0.05em; }

        /* Progress Track */
        .track-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-bottom: 40px; position: relative; }
        .track-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--gold); transition: width 0.6s cubic-bezier(0.19, 1, 0.22, 1); }

        /* Question UI */
        .scenario-box { min-height: 350px; }
        .scenario-label { color: var(--gold); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 15px; display: block; }
        .scenario-text { font-size: 1.5rem; font-family: 'Inter', sans-serif; font-weight: 400; line-height: 1.4; margin-bottom: 40px; }

        .option-list { display: flex; flex-direction: column; gap: 15px; }
        .option-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 25px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            color: var(--white);
        }
        .option-item:hover { background: rgba(212, 175, 55, 0.05); border-color: var(--gold); }
        .option-item.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        .opt-mark { width: 10px; height: 10px; border: 1px solid var(--gold); margin-right: 20px; border-radius: 50%; }
        .option-item.active .opt-mark { background: var(--gold); box-shadow: 0 0 10px var(--gold); }

        /* Results UI */
        #results-screen { display: none; }
        .report-header { text-align: center; margin-bottom: 50px; }
        .identity-badge { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--gold); margin: 20px 0; }
        .level-tag { text-transform: uppercase; letter-spacing: 0.3em; font-size: 0.8rem; color: var(--text-gray); }

        .pillar-analysis { margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 40px; }
        .pillar-card { margin-bottom: 30px; page-break-inside: avoid; }
        .pillar-name { font-weight: 800; text-transform: uppercase; font-size: 0.9rem; color: var(--gold); margin-bottom: 10px; display: block; }
        .pillar-desc { line-height: 1.6; color: #cbd5e1; }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px 40px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 40px;
            transition: 0.3s;
        }
        .nav-btn:hover { background: var(--gold); color: var(--slate-900); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.5s ease forwards; }

        /* PDF Styling */
        #pdf-export-area { padding: 40px; background: #0f172a; color: white; }
    </style>
</head>
<body>

<div class="discovery-container">
    <span class="sli-logo">Speaker Leadership Index</span>

    <div id="quiz-screen">
        <h1>Discover Your Leadership Identity</h1>
        <p class="subtitle">It is revealed when you respond, not when you prepare.</p>

        <div class="track-bg"><div class="track-fill" id="progress"></div></div>

        <div class="scenario-box animate" id="scenario-container">
            </div>
    </div>

    <div id="results-screen">
        <div id="pdf-export-area">
            <div class="report-header">
                <span class="level-tag" id="res-level">Leadership Level</span>
                <h1 class="identity-badge" id="res-identity">The Catalyst</h1>
                <p id="res-experience" style="font-style: italic; color: var(--text-gray); margin-bottom: 30px;"></p>
            </div>

            <div class="pillar-analysis">
                <div class="pillar-card">
                    <span class="pillar-name">Your Natural Presence</span>
                    <p class="pillar-desc" id="res-desc"></p>
                </div>
                <div class="pillar-card">
                    <span class="pillar-name">Growth Focus</span>
                    <p class="pillar-desc" id="res-growth" style="color: var(--accent);"></p>
                </div>
            </div>
        </div>

        <div style="text-align: center;">
            <button class="nav-btn" onclick="downloadReport()">Download Executive Report</button>
            <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-gray);">Qualified for Inner Circle Selection</p>
        </div>
    </div>
</div>

<script>
const sliData = [
    { q: "You step forward. The room is quiet, but attention feels distant.", opts: ["You begin with your prepared opening and allow your message to unfold.", "You adjust your tone and observe how the audience responds as you begin.", "You pause briefly and begin in a way that brings them into the moment with you."] },
    { q: "In the middle of speaking, your mind goes blank for a moment.", opts: ["You continue forward, trusting the flow will return.", "You pause briefly, collect your thoughts, and continue.", "You acknowledge the moment naturally and rebuild the flow."] },
    { q: "Someone asks a question that shifts the direction of your talk.", opts: ["You respond briefly and return to your structure.", "You explore the question and connect it to your message.", "You allow the moment to reshape the direction of the conversation."] },
    { q: "You sense they are listening, but not fully engaged.", opts: ["You continue, trusting the message will land.", "You adjust your delivery to better align with them.", "You shift your approach to bring them into active participation."] },
    { q: "You feel nervous energy rising within you.", opts: ["You continue speaking, focusing on maintaining composure.", "You slow yourself and stabilize your pace.", "You ground yourself fully before continuing."] },
    { q: "You realize their needs are different from what you prepared.", opts: ["You continue, knowing your message still carries value.", "You adjust your examples to better fit them.", "You reshape your message to meet them where they are."] },
    { q: "An unexpected reaction emerges from the audience.", opts: ["You stay focused on your message.", "You acknowledge it briefly and continue.", "You use the moment to deepen engagement."] },
    { q: "Time is running out.", opts: ["You work to complete what you planned.", "You focus on what matters most.", "You ensure they leave with something that stays with them."] },
    { q: "You notice shifts in audience attention.", opts: ["You maintain your delivery.", "You adjust your presence slightly.", "You actively guide their attention and energy."] },
    { q: "You reach the end of your message.", opts: ["You conclude and allow them to reflect.", "You reinforce your key message clearly.", "You close in a way that changes how they see themselves or their next step."] }
];

let step = 0;
let scores = [];

function renderStep() {
    const data = sliData[step];
    const container = document.getElementById('scenario-container');
    document.getElementById('progress').style.width = `${((step + 1) / 10) * 100}%`;

    let html = `
        <span class="scenario-label">Scenario ${step + 1} of 10</span>
        <div class="scenario-text">${data.q}</div>
        <div class="option-list">
    `;

    data.opts.forEach((opt, i) => {
        html += `
            <div class="option-item" onclick="select(${i + 1})">
                <div class="opt-mark"></div>
                ${opt}
            </div>
        `;
    });

    html += `</div>`;
    container.innerHTML = html;
}

function select(val) {
    scores.push(val);
    if (step < 9) {
        step++;
        renderStep();
    } else {
        processResults();
    }
}

function processResults() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('results-screen').style.display = 'block';

    const total = scores.reduce((a, b) => a + b, 0);
    const countA = scores.filter(x => x === 1).length;
    const countB = scores.filter(x => x === 2).length;
    const countC = scores.filter(x => x === 3).length;

    let level = "";
    let experience = "";
    let desc = "";
    let growth = "";
    let identity = "";

    // Score Range Assignments
    if (total <= 14) {
        level = "The Emerging Voice";
        experience = "Steady. Observing. Developing.";
        desc = "You have the foundation. Your leadership is present, but still forming under pressure.";
        growth = "Trust your presence. Leadership begins when you stop protecting yourself and start guiding others.";
    } else if (total <= 20) {
        level = "The Structured Leader";
        experience = "Reliable. Intentional. Increasingly influential.";
        desc = "You bring intention and growing awareness. You are beginning to influence beyond your words.";
        growth = "Move from delivering information to shaping experience.";
    } else if (total <= 25) {
        level = "The Influential Leader";
        experience = "Confident. Engaging. Trustworthy.";
        desc = "You do not just speak. You move people.";
        growth = "Strengthen your ability to transform, not just engage.";
    } else {
        level = "The Transformational Leader";
        experience = "Grounded. Certain. Transformative.";
        desc = "Your presence creates change. People do not just hear you; they see differently because of you.";
        growth = "Scale your influence. Others are ready to follow where you lead.";
    }

    // Identity Assignment based on dominant patterns
    if (countC >= 6) identity = "The Catalyst";
    else if (countC >= 3 || countB >= 5) identity = "The Guide";
    else if (countB >= countA) identity = "The Builder";
    else identity = "The Observer";

    document.getElementById('res-level').innerText = `Leadership Level: ${level}`;
    document.getElementById('res-identity').innerText = identity;
    document.getElementById('res-experience').innerText = `How people experience you: ${experience}`;
    document.getElementById('res-desc').innerText = desc;
    document.getElementById('res-growth').innerText = growth;
}

function downloadReport() {
    const element = document.getElementById('pdf-export-area');
    const opt = {
        margin: 0.5,
        filename: 'SLI_Leadership_Identity.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, backgroundColor: '#0f172a' },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
}

renderStep();
</script>
</body>
</html>
