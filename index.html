<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLI Diagnostic - Stable PDF Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --slate-900: #0f172a; --blue-600: #2563eb;
            --emerald-500: #10b981; --text-main: #334155;
        }

        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; }
        .wrapper { width: 100%; max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Scannable Quiz UI */
        .q-box { margin-bottom: 30px; }
        .q-text { font-size: 1.25rem; font-weight: 700; color: var(--slate-900); margin-bottom: 20px; }
        .opt { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #e2e8f0; border-radius: 8px; text-align: left; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .opt:hover { border-color: var(--blue-600); }
        .opt.selected { background: #eff6ff; border-color: var(--blue-600); font-weight: 600; }

        /* Progress Bar */
        .prog-bg { background: #e2e8f0; height: 8px; border-radius: 4px; margin: 20px 0; }
        .prog-fill { background: var(--blue-600); height: 100%; width: 0%; border-radius: 4px; transition: 0.3s; }

        /* Results Display */
        #results-ui { display: none; }
        
        /* PDF Specific Formatting - Critical for Stability */
        .pdf-page { padding: 20px; background: white; }
        .pillar-card { 
            border: 1px solid #e2e8f0; border-left: 8px solid var(--blue-600);
            padding: 25px; margin-bottom: 20px; border-radius: 10px;
            page-break-inside: avoid; /* Standard break prevention */
        }
        .pct-label { font-size: 2rem; font-weight: 800; color: var(--blue-600); }
        .label { font-size: 0.75rem; text-transform: uppercase; font-weight: 800; color: #64748b; margin-top: 15px; display: block; }
        
        /* Force page break for PDF engine */
        .html2pdf__page-break { display: block; height: 1px; page-break-before: always; }

        .btn { padding: 12px 24px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; margin-right: 10px; }
        .btn-primary { background: var(--slate-900); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--text-main); }
        .btn:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div class="wrapper" id="main-app">
    <div id="quiz-ui">
        <h2 style="font-family: 'Playfair Display'; font-size: 2rem;">Speaker Leadership Index</h2>
        <div class="prog-bg"><div class="prog-fill" id="p-bar"></div></div>
        <div id="q-container"></div>
        <div style="margin-top: 30px;">
            <button class="btn btn-secondary" onclick="change(-1)" id="prev-btn">Back</button>
            <button class="btn btn-primary" onclick="change(1)" id="next-btn" disabled>Next</button>
        </div>
    </div>

    <div id="results-ui">
        <div id="pdf-container">
            <div style="text-align: center; border-bottom: 2px solid #0f172a; padding-bottom: 20px; margin-bottom: 30px;">
                <h1 style="font-family: 'Playfair Display'; margin:0;">SLI Executive Analysis</h1>
                <p style="color: #64748b;">A Comprehensive Public Speaking Leadership Diagnostic</p>
                <h2 id="final-archetype" style="color: var(--blue-600); font-size: 1.8rem;"></h2>
            </div>
            
            <div id="pillar-results"></div>
        </div>

        <div style="margin-top: 30px; text-align: center;" class="no-print">
            <button class="btn btn-secondary" onclick="location.reload()">Restart</button>
            <button class="btn btn-primary" onclick="downloadPDF()">Download Stable PDF</button>
        </div>
    </div>
</div>

<script>
const scenarios = [
    { p: "Connection", q: "Scenario 1: You step forward. The room is quiet, but attention feels distant.", opts: ["A. Begin with your prepared opening and allow your message to unfold.", "B. Adjust your tone and observe how the audience responds as you begin.", "C. Pause briefly and begin in a way that brings them into the moment with you."] },
    { p: "Confidence", q: "Scenario 2: In the middle of speaking, your mind goes blank for a moment.", opts: ["A. Continue forward, trusting the flow will return.", "B. Pause briefly, collect your thoughts, and continue.", "C. Acknowledge the moment naturally and rebuild the flow."] },
    { p: "Clarity", q: "Scenario 3: Someone asks a question that shifts the direction of your talk.", opts: ["A. Respond briefly and return to your structure.", "B. Explore the question and connect it to your message.", "C. Allow the moment to reshape the direction of the conversation."] },
    { p: "Connection", q: "Scenario 4: You sense they are listening, but not fully engaged.", opts: ["A. Continue, trusting the message will land.", "B. Adjust your delivery to better align with them.", "C. Shift your approach to bring them into active participation."] },
    { p: "Confidence", q: "Scenario 5: You feel nervous energy rising within you.", opts: ["A. Continue speaking, focusing on maintaining composure.", "B. Slow yourself and stabilize your pace.", "C. Ground yourself fully before continuing."] },
    { p: "Clarity", q: "Scenario 6: You realize their needs are different from what you prepared.", opts: ["A. Continue, knowing your message still carries value.", "B. Adjust your examples to better fit them.", "C. Reshape your message to meet them where they are."] },
    { p: "Connection", q: "Scenario 7: An unexpected reaction emerges from the audience.", opts: ["A. Stay focused on your message.", "B. Acknowledge it briefly and continue.", "C. Use the moment to deepen engagement."] },
    { p: "Transformation", q: "Scenario 8: Time is running out.", opts: ["A. Work to complete what you planned.", "B. Focus on what matters most.", "C. Ensure they leave with something that stays with them."] },
    { p: "Transformation", q: "Scenario 9: You notice shifts in audience attention.", opts: ["A. Maintain your delivery.", "B. Adjust your presence slightly.", "C. Actively guide their attention and energy."] },
    { p: "Transformation", q: "Scenario 10: You reach the end of your message.", opts: ["A. Conclude and allow them to reflect.", "B. Reinforce your key message clearly.", "C. Close in a way that changes how they see themselves or their next step."] }
];

const feedback = {
    "Connection": "Building a bridge between your intent and their reality. Leadership begins when the audience feels 'seen' by the speaker.",
    "Confidence": "The internal state of grounding. It is the transition from self-consciousness to message-consciousness.",
    "Clarity": "The architectural strength of your talk. It requires the courage to cut what is secondary to serve what is vital.",
    "Transformation": "The ultimate goal: Impact. You are not giving information; you are facilitating a change in the listener."
};

let current = 0;
let results = new Array(10).fill(null);

function renderQ() {
    const s = scenarios[current];
    let html = `<div class="q-box"><div class="q-text">${s.q}</div>`;
    s.opts.forEach((o, i) => {
        html += `<button class="opt ${results[current] === i+1 ? 'selected' : ''}" onclick="pick(${i+1})">${o}</button>`;
    });
    html += `</div>`;
    document.getElementById('q-container').innerHTML = html;
    document.getElementById('p-bar').style.width = `${(current + 1) * 10}%`;
    document.getElementById('prev-btn').disabled = (current === 0);
    document.getElementById('next-btn').disabled = (results[current] === null);
    document.getElementById('next-btn').innerText = current === 9 ? "Finish" : "Next";
}

window.pick = (val) => { results[current] = val; renderQ(); };
window.change = (dir) => { 
    if (dir === 1 && current === 9) { showResults(); return; }
    current += dir; renderQ(); 
};

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    const ui = document.getElementById('results-ui');
    ui.style.display = 'block';

    const totals = { Connection: 0, Confidence: 0, Clarity: 0, Transformation: 0 };
    const counts = { Connection: 0, Confidence: 0, Clarity: 0, Transformation: 0 };

    scenarios.forEach((s, i) => {
        totals[s.p] += results[i];
        counts[s.p]++;
    });

    let html = "";
    Object.keys(totals).forEach(p => {
        // Percentage: (Score / (Questions * MaxScore of 3)) * 100
        const pct = Math.round((totals[p] / (counts[p] * 3)) * 100);
        html += `
            <div class="pillar-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:1.4rem; font-weight:800;">${p} Index</span>
                    <span class="pct-label">${pct}%</span>
                </div>
                <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>
                <span class="label">Strategic Context</span>
                <p style="margin:5px 0 0; line-height:1.5;">${feedback[p]}</p>
            </div>
        `;
    });
    
    document.getElementById('pillar-results').innerHTML = html;
    const sum = results.reduce((a, b) => a + b, 0);
    document.getElementById('final-archetype').innerText = sum > 25 ? "The Transformational Leader" : sum > 18 ? "The Adaptive Speaker" : "The Foundational Communicator";
}

async function downloadPDF() {
    const element = document.getElementById('pdf-container');
    const opt = {
        margin: [0.5, 0.5, 0.5, 0.5],
        filename: 'SLI_Leadership_Report.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
            scale: 2, 
            useCORS: true, 
            logging: false,
            width: 1024 // Forces a stable width to prevent clipping
        },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'] }
    };

    // Use the .from().set().save() chain for maximum reliability
    html2pdf().from(element).set(opt).save();
}

renderQ();
</script>
</body>
</html>
