<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 20-Point Crucible | Public Speaking Diagnostic</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0B1021;
            --card-bg: #1A2235;
            --primary: #D4AF37; /* Gold */
            --primary-hover: #F3E5AB;
            --text-main: #F8F9FA;
            --text-muted: #94A3B8;
            --accent-red: #EF4444;
            --accent-green: #10B981;
        }

        body {
            font-family: 'Source Sans Pro', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px 50px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            position: relative;
            overflow: hidden;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; margin-top: 0; }
        
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .header h1 { color: var(--primary); font-size: 2.2rem; letter-spacing: 1px; }
        .header p { color: var(--text-muted); font-size: 1.1rem; }

        /* Progress Bar */
        .progress-wrap { margin-bottom: 30px; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--primary); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; }

        /* Quiz UI */
        .q-meta { color: var(--primary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        .question-text { font-size: 1.5rem; line-height: 1.4; margin-bottom: 30px; }

        .options-grid { display: grid; gap: 15px; }
        .option-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 18px 25px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1.1rem;
            font-family: inherit;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }
        .option-btn:hover { border-color: var(--primary); background: rgba(212, 175, 55, 0.05); }
        .option-btn.selected { border-color: var(--primary); background: rgba(212, 175, 55, 0.15); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        .opt-letter { width: 30px; min-width: 30px; height: 30px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 20px; font-weight: bold; color: var(--primary); }

        /* Navigation */
        .nav-footer { display: flex; justify-content: space-between; margin-top: 40px; }
        .btn { padding: 14px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; font-family: inherit; }
        .btn-prev { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); }
        .btn-prev:hover:not(:disabled) { border-color: white; color: white; }
        .btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-next { background: var(--primary); border: 1px solid var(--primary); color: var(--bg-color); }
        .btn-next:hover:not(:disabled) { background: var(--primary-hover); }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Results UI */
        #results-ui { display: none; }
        .result-header { text-align: center; margin-bottom: 40px; }
        .archetype { font-size: 2.8rem; color: var(--primary); margin: 10px 0; }
        
        .pillar-grid { display: grid; grid-template-columns: 1fr; gap: 25px; margin-bottom: 40px; }
        .pillar-card { background: rgba(0,0,0,0.2); padding: 25px; border-radius: 12px; border-left: 4px solid var(--primary); }
        .pillar-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--primary); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .pillar-score { font-family: 'Source Sans Pro', sans-serif; font-size: 1rem; color: var(--text-muted); }
        
        .protocol-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .protocol-title { color: var(--accent-red); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: bold; }
        .protocol-text { color: var(--text-main); font-size: 1.05rem; line-height: 1.6; }
        .protocol-text strong { color: var(--primary); }

        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fade 0.4s ease forwards; }

        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            .option-btn { font-size: 1rem; padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container" id="capture-area">
    <div id="quiz-ui">
        <div class="header">
            <h1>The 20-Point Crucible</h1>
            <p>A Behavioral Diagnostic of the Five Pillars of Influence</p>
        </div>

        <div class="progress-wrap">
            <div class="progress-text">
                <span id="p-text">Scenario 1 of 20</span>
                <span id="p-pillar">Pillar: Stage Fright & Presence</span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="p-fill"></div></div>
        </div>

        <div class="animate" id="q-container">
            </div>

        <div class="nav-footer">
            <button class="btn btn-prev" id="btn-prev" onclick="move(-1)">← Previous</button>
            <button class="btn btn-next" id="btn-next" onclick="move(1)">Next →</button>
        </div>
    </div>

    <div id="results-ui">
        <div class="result-header">
            <h3>Diagnostic Complete</h3>
            <h1 class="archetype" id="res-archetype">The Master Communicator</h1>
            <p id="res-desc" style="font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; line-height: 1.6;"></p>
        </div>

        <h3 style="color: white; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Your Functional Gap Analysis</h3>
        <div class="pillar-grid" id="pillar-grid">
            </div>

        <div class="nav-footer" data-html2canvas-ignore>
            <button class="btn btn-prev" onclick="location.reload()">Retake Diagnostic</button>
            <button class="btn btn-next" onclick="downloadPDF()">Download Masterclass PDF</button>
        </div>
    </div>
</div>

<script>
// The 20 Scenarios mapped to the 5 Pillars. 
// Values: 0 = High Friction (Flight/Freeze), 1 = Misguided/Ego (Fight), 2 = Flow/Mastery
const quizData = [
    // PILLAR 1: Stage Fright & Presence
    { pillar: 0, pName: "Stage Fright & Presence", q: "The Pre-Speech Panic: Your heart is hammering, and a nameless terror washes over you as the eyes of the audience turn your way.", opts: [
        { text: "Try to calm down by focusing on not making any embarrassing mistakes.", val: 0 },
        { text: "Hype up your ego. Tell yourself you are better than everyone in the room.", val: 1 },
        { text: "Shift focus entirely to your message. Subordinate your ego to the truth you are delivering.", val: 2 }
    ]},
    { pillar: 0, pName: "Stage Fright & Presence", q: "The Stumbling Start: You walk to the center of the stage, realize your opening joke fell flat. Your first instinct is to...", opts: [
        { text: "Smile nervously and apologize: 'I'm not much of a speaker, but...'", val: 0 },
        { text: "Make a defensive, sarcastic remark to put the blame on the audience.", val: 1 },
        { text: "Ignore the silence. Do not apologize. Go straight ahead with confident bearing.", val: 2 }
    ]},
    { pillar: 0, pName: "Stage Fright & Presence", q: "The Anticipation Blank-Out: You are mid-sentence, and suddenly your mind goes completely blank.", opts: [
        { text: "Panic, break eye contact, and fumble awkwardly through your notes.", val: 0 },
        { text: "Start rambling rapidly off-topic hoping you'll eventually remember the point.", val: 1 },
        { text: "Pause. Pick up the last important word you said and build a new sentence from it.", val: 2 }
    ]},
    { pillar: 0, pName: "Stage Fright & Presence", q: "The Paper Crutch: You have a vital, highly technical message to deliver.", opts: [
        { text: "Write it word-for-word and read it from the desk so you don't make a mistake.", val: 0 },
        { text: "Memorize it word-for-word so you can recite it flawlessly, even if it sounds robotic.", val: 1 },
        { text: "Master the concepts, use a brief outline, and extemporize to maintain eye contact.", val: 2 }
    ]},

    // PILLAR 2: Stage Management & Body Language
    { pillar: 1, pName: "Stage Management & Body Language", q: "The Choreographed Arm: You want to look dynamic on stage.", opts: [
        { text: "Keep your hands tightly gripped to the podium so you don't look nervous.", val: 0 },
        { text: "Plan exactly when to raise your arm and point to the audience.", val: 1 },
        { text: "Cultivate inner enthusiasm and let your gestures be born spontaneously.", val: 2 }
    ]},
    { pillar: 1, pName: "Stage Management & Body Language", q: "The Restless Pacer: You are delivering a standard business update.", opts: [
        { text: "Shift your weight constantly and adjust your cuffs to burn off nervous energy.", val: 0 },
        { text: "Pace back and forth across the stage continuously to look 'energetic'.", val: 1 },
        { text: "Stand still. Move your feet only when transitioning to a new significant thought.", val: 2 }
    ]},
    { pillar: 1, pName: "Stage Management & Body Language", q: "The Posture of Fire: You are delivering a fiery, aggressive denunciation of a social wrong.", opts: [
        { text: "Stand with your heels close together, weight on your back foot.", val: 0 },
        { text: "Pound the table repeatedly with a closed fist.", val: 1 },
        { text: "Let yourself go. Allow nature to pull your weight to your forward foot.", val: 2 }
    ]},
    { pillar: 1, pName: "Stage Management & Body Language", q: "The Masked Face: You are telling a heartbreaking, tragic story.", opts: [
        { text: "Keep a blank, clinical face to maintain 'professionalism'.", val: 0 },
        { text: "Wave your arms and shout to make sure the audience feels the drama.", val: 1 },
        { text: "Use quiet, intense posture and let the genuine emotion shine through your eyes.", val: 2 }
    ]},

    // PILLAR 3: Vocal Power & Monotony
    { pillar: 2, pName: "Vocal Power & Monotony", q: "The Natural Drone: You are speaking to a room of 200 people.", opts: [
        { text: "Speak exactly as you do when chatting with a friend at a coffee shop.", val: 0 },
        { text: "Yell the entire time to ensure everyone in the back row hears you.", val: 1 },
        { text: "Use 'idealized nature': amplify your voice, vary pitch, and change pace consciously.", val: 2 }
    ]},
    { pillar: 2, pName: "Vocal Power & Monotony", q: "The Breathless Rush: You reach the most profound idea of your speech.", opts: [
        { text: "Speed through it quickly so you don't lose the audience's attention.", val: 0 },
        { text: "Speak it loudly and rapidly, rushing immediately to the next point.", val: 1 },
        { text: "Stop. Pause before the idea to gather force, and pause after to let it soak in.", val: 2 }
    ]},
    { pillar: 2, pName: "Vocal Power & Monotony", q: "The Tight Throat: You are nervous, and your voice comes out high, raspy, and thin.", opts: [
        { text: "Force the voice out harder from your throat.", val: 0 },
        { text: "Drink a glass of ice-cold water to shock your vocal cords.", val: 1 },
        { text: "Relax the jaw, breathe from the diaphragm, and 'think' the tone forward.", val: 2 }
    ]},
    { pillar: 2, pName: "Vocal Power & Monotony", q: "The False Emphasizer: You want to deliver the sentence 'We must all work together' with great emphasis.", opts: [
        { text: "Say it quickly and quietly.", val: 0 },
        { text: "Shout every single word in the sentence equally.", val: 1 },
        { text: "Subordinate the small words and strike the 'mountain peak' words with intense earnestness.", val: 2 }
    ]},

    // PILLAR 4: Crowd Psychology
    { pillar: 3, pName: "Audience & Crowd Psychology", q: "The Scattered Flock: You are speaking to 50 people in a room built for 500. They are scattered everywhere.", opts: [
        { text: "Proceed with your speech exactly as planned.", val: 0 },
        { text: "Focus entirely on the 5 people sitting in the front row.", val: 1 },
        { text: "Stop. Ask everyone to move to the front and sit compactly before you begin.", val: 2 }
    ]},
    { pillar: 3, pName: "Audience & Crowd Psychology", q: "The Argumentative Trap: You want to convince a highly prejudiced audience to change their view.", opts: [
        { text: "Start with a barrage of cold, hard logic and statistics.", val: 0 },
        { text: "Argue aggressively, telling them why their current beliefs are wrong.", val: 1 },
        { text: "Secure their confidence first, find a unifying theme, and appeal to their interests.", val: 2 }
    ]},
    { pillar: 3, pName: "Audience & Crowd Psychology", q: "The Authority Deficit: You make a bold claim, but the audience looks skeptical.", opts: [
        { text: "Back down and say 'Well, that's just my opinion.'", val: 0 },
        { text: "Repeat the claim louder and get angry at their skepticism.", val: 1 },
        { text: "Borrow authority by citing recognized experts or undeniably proven facts.", val: 2 }
    ]},
    { pillar: 3, pName: "Audience & Crowd Psychology", q: "The Contagion of Action: You want the audience to donate to a cause, but no one is stepping up.", opts: [
        { text: "Wait in awkward silence until someone pities you and acts.", val: 0 },
        { text: "Scold them for being selfish and unfeeling.", val: 1 },
        { text: "Use the crowd mind: show that others have already given to initiate the contagion.", val: 2 }
    ]},

    // PILLAR 5: Character & Internal Preparation
    { pillar: 4, pName: "Character & Internal Preparation", q: "The Counterfeit Emotion: You are speaking about a tragic event.", opts: [
        { text: "Ignore the emotion and deliver the facts clinically.", val: 0 },
        { text: "Fake a sad, trembling voice because you know it sounds dramatic.", val: 1 },
        { text: "Actually enter into the character/situation and let genuine feeling possess you.", val: 2 }
    ]},
    { pillar: 4, pName: "Character & Internal Preparation", q: "The Stale Vocabulary: You are trying to describe a beautiful scene.", opts: [
        { text: "Use everyday street chatter: 'It was super nice and very pretty.'", val: 0 },
        { text: "Use overly flowery, pompous words to sound like a scholar.", val: 1 },
        { text: "Search faithfully for the exact right word and fresh comparisons.", val: 2 }
    ]},
    { pillar: 4, pName: "Character & Internal Preparation", q: "The Empty Well: You are invited to speak next week.", opts: [
        { text: "Sit down with a blank piece of paper and stress over 'What shall I say?'", val: 0 },
        { text: "Find a good speech online and heavily borrow from it.", val: 1 },
        { text: "Draw from your daily observation and let the subject choose itself from your 'reserve power'.", val: 2 }
    ]},
    { pillar: 4, pName: "Character & Internal Preparation", q: "The Ultimate Personality Check: You have mastered gesture and voice, but the audience still doesn't trust you.", opts: [
        { text: "Assume the audience is just hostile and give up.", val: 0 },
        { text: "Try to put on a faker, more 'pleasing' persona to win them over.", val: 1 },
        { text: "Look inward. Cultivate sincere sympathy and right thinking. 'As a man thinketh... so is he.'", val: 2 }
    ]}
];

// Transformation Protocols based on Carnegie/Esenwein masterclass
const protocols = [
    {
        name: "Stage Fright & Presence",
        desc: "You are leaking power to self-consciousness. You view yourself as an exhibit rather than a messenger.",
        action: "<strong>The Transformation:</strong> Shift your focus entirely to the message. Subordinate your ego to the truth. Never apologize for your speaking ability. If you blank out, do not panic—pick up the last important word you said and build a new sentence from it. Drop the manuscript; notes are crutches."
    },
    {
        name: "Stage Management & Body Language",
        desc: "Your body is contradicting your message. You rely on mechanical, wooden gestures or meaningless pacing.",
        action: "<strong>The Transformation:</strong> Let gestures be born, not built. Find stillness—movement without meaning destroys attention. Let your posture reflect the exact spirit of your speech (e.g., weight forward for aggressive points). Let genuine emotion shine through the eyes instead of waving your arms."
    },
    {
        name: "Vocal Power & Monotony",
        desc: "You suffer from vocal monotony or rely on inappropriate speed and volume to force your point.",
        action: "<strong>The Transformation:</strong> Master the Pause. Stop before a big idea to gather force, and after to let it soak in. Subordinate small words and strike the 'mountain peak' words. Breathe from the diaphragm, relax the jaw, and stop yelling—use idealized nature."
    },
    {
        name: "Audience & Crowd Psychology",
        desc: "You are talking to individuals rather than fusing them into a unified 'Crowd Mind.'",
        action: "<strong>The Transformation:</strong> You must physically unify an audience to emotionally fuse them—pack them together. Do not start with pure logic or argument; secure their confidence first and appeal to universal emotions. If they doubt you, borrow authority from recognized experts."
    },
    {
        name: "Character & Internal Preparation",
        desc: "Your internal preparation is shallow. You rely on mechanical tricks rather than deep, living truth.",
        action: "<strong>The Transformation:</strong> You cannot sham emotion—you must actually ENTER INTO the situation and feel it. Cultivate a dynamic vocabulary. Build your 'reserve power' daily through observation so your speech is an overflow, not a dry pumping. Remember: Character is a natural power."
    }
];

let currentQ = 0;
let userAnswers = new Array(20).fill(null);

function render() {
    const q = quizData[currentQ];
    
    // Update Header/Progress
    document.getElementById('p-text').innerText = `Scenario ${currentQ + 1} of 20`;
    document.getElementById('p-pillar').innerText = q.pName;
    document.getElementById('p-fill').style.width = `${((currentQ + 1) / 20) * 100}%`;

    // Render Question
    const container = document.getElementById('q-container');
    
    // Randomize options visually so the "right" answer isn't always C
    // We map original index to keep track of the value
    let displayOpts = q.opts.map((opt, index) => ({...opt, origIndex: index}));
    // Simple seeded shuffle based on question index so it stays consistent on re-renders
    let shuffleSeed = currentQ % 3; 
    if (shuffleSeed === 1) displayOpts = [displayOpts[1], displayOpts[2], displayOpts[0]];
    if (shuffleSeed === 2) displayOpts = [displayOpts[2], displayOpts[0], displayOpts[1]];

    let html = `<div class="q-meta">${q.pName}</div>
                <div class="question-text">${q.q}</div>
                <div class="options-grid">`;
    
    const letters = ['A', 'B', 'C'];
    displayOpts.forEach((opt, i) => {
        const isSelected = userAnswers[currentQ] === opt.val;
        html += `<button class="option-btn ${isSelected ? 'selected' : ''}" onclick="selectOpt(${opt.val})">
                    <div class="opt-letter">${letters[i]}</div>
                    <div>${opt.text}</div>
                 </button>`;
    });
    html += `</div>`;
    
    // Force DOM reflow for animation
    container.classList.remove('animate');
    void container.offsetWidth; 
    container.innerHTML = html;
    container.classList.add('animate');

    // Buttons
    document.getElementById('btn-prev').disabled = currentQ === 0;
    const nextBtn = document.getElementById('btn-next');
    nextBtn.disabled = userAnswers[currentQ] === null;
    nextBtn.innerText = currentQ === 19 ? "View Masterclass Analysis" : "Next →";
}

window.selectOpt = function(val) {
    userAnswers[currentQ] = val;
    render();
}

window.move = function(dir) {
    if (dir === 1 && currentQ === 19) {
        showResults();
        return;
    }
    currentQ += dir;
    render();
}

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    document.getElementById('results-ui').style.display = 'block';

    // Calculate Scores per Pillar
    let pillarScores = [0, 0, 0, 0, 0];
    userAnswers.forEach((ans, i) => {
        const pIndex = quizData[i].pillar;
        pillarScores[pIndex] += ans;
    });

    // Total Score (Max 40)
    let totalScore = pillarScores.reduce((a, b) => a + b, 0);
    
    let archName = "";
    let archDesc = "";
    if (totalScore < 16) {
        archName = "The Novice (High Friction)";
        archDesc = "Your communication instincts currently lean toward fear, mechanical responses, and ego-protection. You are fighting the audience rather than leading them.";
    } else if (totalScore < 32) {
        archName = "The Technician (Developing)";
        archDesc = "You have a solid grasp of the basics, but you often substitute technique for genuine connection. You are 'performing' rather than 'transforming'.";
    } else {
        archName = "The Master Communicator (Flow)";
        archDesc = "You possess excellent instincts. You understand that the inner man dictates the outer expression, and you know how to wield the psychology of the crowd.";
    }

    document.getElementById('res-archetype').innerText = archName;
    document.getElementById('res-desc').innerText = archDesc;

    // Render Pillar Breakdown & Protocols
    let gridHtml = "";
    [0, 1, 2, 3, 4].forEach(i => {
        const score = pillarScores[i];
        const max = 8;
        const percent = (score / max) * 100;
        
        let protocolHtml = "";
        // Trigger transformation plan if score is less than perfect mastery (less than 7)
        if (score < 7) {
            protocolHtml = `
                <div class="protocol-box">
                    <div class="protocol-title">Blind Spot Detected</div>
                    <div class="protocol-text">${protocols[i].desc} <br><br> ${protocols[i].action}</div>
                </div>
            `;
        } else {
            protocolHtml = `
                <div class="protocol-box" style="border-top: 1px solid rgba(16, 185, 129, 0.3);">
                    <div class="protocol-title" style="color: var(--accent-green);">Mastery Achieved</div>
                    <div class="protocol-text">Your instincts here align perfectly with the Masterclass principles.</div>
                </div>
            `;
        }

        gridHtml += `
            <div class="pillar-card">
                <div class="pillar-title">
                    <span>${protocols[i].name}</span>
                    <span class="pillar-score">Score: ${score}/8</span>
                </div>
                <div class="progress-track" style="background: rgba(0,0,0,0.3); margin-bottom: 15px;">
                    <div class="progress-fill" style="width: ${percent}%;"></div>
                </div>
                ${protocolHtml}
            </div>
        `;
    });

    document.getElementById('pillar-grid').innerHTML = gridHtml;
}

window.downloadPDF = function() {
    const element = document.getElementById('capture-area');
    const opt = {
        margin: 0.2,
        filename: 'Masterclass_Transformation_Plan.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
}

// Init
render();
</script>

</body>
</html>
