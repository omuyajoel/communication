<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Influence Diagnostic | Vetting Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #6366f1;
            --bg: #f8fafc;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; width: 95%; max-width: 850px; border-radius: 24px; padding: 60px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; }
        
        .nav-footer { display: flex; justify-content: space-between; margin-top: 50px; }
        .btn { padding: 14px 34px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; border: 1.5px solid var(--primary); font-size: 0.8rem; letter-spacing: 1px; }
        .btn-prev { background: transparent; color: var(--primary); }
        .btn-next { background: var(--primary); color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .question-text { font-size: 1.6rem; font-weight: 800; line-height: 1.3; margin-bottom: 35px; color: #0f172a; }
        .option-container { display: flex; flex-direction: column; gap: 15px; }
        .option { padding: 20px 25px; border: 1.5px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; text-align: left; background: white; font-size: 1rem; }
        .option:hover { border-color: var(--accent); background: #f5f3ff; }
        .option.selected { border-color: var(--accent); background: #f5f3ff; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        .progress-bar { position: absolute; top: 0; left: 0; height: 6px; background: #e2e8f0; width: 100%; border-radius: 24px 24px 0 0; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s; }

        /* Analysis UI */
        #results { display: none; }
        .risk-meter { height: 10px; background: #e2e8f0; border-radius: 5px; margin: 10px 0 25px; overflow: hidden; }
        .risk-fill { height: 100%; transition: width 1s ease-out; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px; }
        .risk-label { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; color: #64748b; }
    </style>
</head>
<body>

<div class="card">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    
    <div id="quiz-ui">
        <div id="question-container"></div>
        <div class="nav-footer">
            <button class="btn btn-prev" id="prev-btn" onclick="prev()">← PREVIOUS</button>
            <button class="btn btn-next" id="next-btn" onclick="next()">NEXT STEP →</button>
        </div>
    </div>

    <div id="results">
        <div id="pdf-content">
            <h1 style="font-weight: 800; font-size: 2.2rem; margin-bottom: 5px;">Influence Risk Profile</h1>
            <p style="color: #64748b; margin-bottom: 40px;">Psychometric Vetting Analysis</p>
            
            <div id="risk-meters"></div>
            
            <div class="grid">
                <div style="background: #f8fafc; padding: 25px; border-radius: 16px;">
                    <h4 style="margin-top:0; color:var(--accent);">Core Behavioral Leak</h4>
                    <p id="leak-desc" style="font-size: 0.95rem; line-height: 1.6;"></p>
                </div>
                <div style="background: #f8fafc; padding: 25px; border-radius: 16px;">
                    <h4 style="margin-top:0; color:var(--accent);">High-Stakes Protocol</h4>
                    <ul id="protocol-list" style="font-size: 0.95rem; padding-left: 20px; line-height: 1.8;"></ul>
                </div>
            </div>
        </div>
        <div class="nav-footer">
            <button class="btn btn-next" onclick="savePDF()">DOWNLOAD PDF</button>
            <button class="btn btn-prev" onclick="location.reload()">RE-DIAGNOSE</button>
        </div>
    </div>
</div>

<script>
// Oblique questions that don't reveal the 'right' answer
const questions = [
    { q: "An executive challenges a data point that you know is 100% correct. You prioritize:", a: "Ensuring the record is corrected immediately to maintain total accuracy.", b: "Validating their perspective to ensure the relationship remains intact.", c: "Understanding the motive behind their challenge to see if it changes the deal." },
    { q: "You have 60 seconds left and two slides to go. Do you:", a: "Speak faster to ensure all intended information is physically delivered.", b: "Skip the slides and use the time to thank the audience for their attention.", c: "Ask the audience one specific question that forces them to take a side." },
    { q: "Your mind goes blank. Your immediate internal focus is:", a: "Scanning your mental notes to find the exact logical thread you lost.", b: "Regulating your body language so the audience doesn't see you 'fail'.", c: "Checking the audience's faces to see if the silence is actually working in your favor." },
    { q: "In a meeting with higher-status individuals, your speech pattern shifts to:", a: "More formal, precise, and technical to establish your 'right' to be there.", b: "Warm, agreeable, and encouraging to build social cohesion.", c: "Brief, direct, and outcome-focused, often using longer silences." },
    { q: "A peer tells you your talk was 'too technical'. Your first reflex is:", a: "To explain the complexity of the subject matter that required that depth.", b: "To feel a sense of social regret for not 'connecting' better.", c: "To calculate if that technicality prevented the decision-maker from acting." }
];

// Weighted values: [Rigidity, Validation, Friction]
const weights = [
    { A: [2, 0, 0], B: [0, 2, 0], C: [0, 0, 2] },
    { A: [2, 0, 0], B: [0, 2, 0], C: [0, 0, 2] },
    { A: [2, 0, 0], B: [0, 2, 0], C: [0, 0, 2] },
    { A: [2, 0, 0], B: [0, 2, 0], C: [0, 0, 2] },
    { A: [2, 0, 0], B: [0, 2, 0], C: [0, 0, 2] }
];

let currentIdx = 0;
let userAnswers = new Array(questions.length).fill(null);

function render() {
    const container = document.getElementById('question-container');
    const q = questions[currentIdx];
    container.innerHTML = `
        <div class="question-text">${q.q}</div>
        <div class="option-container">
            <button class="option ${userAnswers[currentIdx]==='A'?'selected':''}" onclick="setAns('A')">${q.a}</button>
            <button class="option ${userAnswers[currentIdx]==='B'?'selected':''}" onclick="setAns('B')">${q.b}</button>
            <button class="option ${userAnswers[currentIdx]==='C'?'selected':''}" onclick="setAns('C')">${q.c}</button>
        </div>
    `;
    document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
    document.getElementById('prev-btn').disabled = currentIdx === 0;
    document.getElementById('next-btn').disabled = userAnswers[currentIdx] === null;
    document.getElementById('next-btn').innerText = currentIdx === questions.length - 1 ? "FINALIZE VETTING" : "NEXT STEP →";
}

window.setAns = (v) => { userAnswers[currentIdx] = v; render(); };
window.prev = () => { currentIdx--; render(); };
window.next = () => { if(currentIdx < questions.length - 1) { currentIdx++; render(); } else { showResults(); } };

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    let totals = [0, 0, 0]; // Rigidity, Validation, Friction
    userAnswers.forEach((ans, i) => {
        weights[i][ans].forEach((val, index) => totals[index] += val);
    });

    const categories = [
        { name: "Informational Rigidity", val: totals[0], color: "#ef4444", d: "You prioritize data accuracy over human movement. You likely overwhelm stakeholders with 'The How' while they are looking for 'The Why'.", t: ["Cut your decks by 60%.", "Focus on the 'Diagnosis' rather than the 'Description'."] },
        { name: "Validation Dependency", val: totals[1], color: "#f59e0b", d: "You prioritize social harmony and personal likability. You likely 'soften' your message so much that it loses its edge and urgency.", t: ["Speak 20% slower.", "Practice delivering bad news without a smile."] },
        { name: "Strategic Friction", val: totals[2], color: "#10b981", d: "You focus on outcomes but may lack the technical or social 'buy-in' to make them stick. You risk being viewed as too transactional.", t: ["Anchor your challenges in shared data.", "Use 'We' instead of 'I' during calls to action."] }
    ];

    const meterContainer = document.getElementById('risk-meters');
    meterContainer.innerHTML = categories.map(c => `
        <div class="risk-label">${c.name}</div>
        <div class="risk-meter"><div class="risk-fill" style="width:${(c.val/10)*100}%; background:${c.color};"></div></div>
    `).join('');

    const topRisk = categories.sort((a,b) => b.val - a.val)[0];
    document.getElementById('leak-desc').innerText = topRisk.d;
    document.getElementById('protocol-list').innerHTML = topRisk.t.map(t => `<li>${t}</li>`).join('');
}

window.savePDF = () => { html2pdf().from(document.getElementById('pdf-content')).save('Vetting_Analysis.pdf'); };

render();
</script>
</body>
</html>
