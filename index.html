<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speaker Leadership Index (SLI) - Pro Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --slate-900: #0f172a; --slate-800: #1e293b; --emerald-500: #10b981;
            --blue-600: #2563eb; --text-main: #334155; --text-light: #64748b;
        }

        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--text-main); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { background: #fff; width: 100%; max-width: 850px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); padding: 50px; border: 1px solid #e2e8f0; }

        h1 { font-family: 'Playfair Display', serif; color: var(--slate-900); font-size: 2.2rem; margin-bottom: 10px; }
        .subtitle { color: var(--text-light); font-size: 1.1rem; margin-bottom: 40px; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; }

        /* Progress Tracker */
        .bar-bg { background: #e2e8f0; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .bar-fill { background: var(--blue-600); height: 100%; width: 0%; transition: width 0.4s ease; }

        /* Quiz UI */
        .scenario-tag { background: #eff6ff; color: var(--blue-600); padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; margin-bottom: 15px; display: inline-block; }
        .question-text { font-size: 1.3rem; font-weight: 600; line-height: 1.4; color: var(--slate-900); margin-bottom: 30px; }
        .opt-btn { background: #fff; border: 2px solid #e2e8f0; padding: 18px; border-radius: 12px; text-align: left; cursor: pointer; width: 100%; margin-bottom: 12px; display: flex; align-items: center; font-size: 1rem; transition: 0.2s; }
        .opt-btn:hover { border-color: var(--blue-600); background: #f0f7ff; }
        .opt-btn.selected { border-color: var(--blue-600); background: #eff6ff; font-weight: 600; }
        .opt-idx { width: 28px; height: 28px; background: var(--slate-900); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; flex-shrink: 0; }

        /* PDF & Results */
        #results-area { display: none; }
        .pillar-card { 
            background: #fff; border: 1px solid #e2e8f0; border-left: 8px solid var(--blue-600);
            padding: 30px; margin-bottom: 30px; border-radius: 12px; page-break-inside: avoid;
        }
        .percentage-badge { font-size: 2rem; font-weight: 800; color: var(--blue-600); }
        .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; display: block; margin-top: 20px; color: var(--slate-900); }
        .report-body { line-height: 1.7; font-size: 1.05rem; margin-top: 5px; }

        .nav { display: flex; justify-content: space-between; margin-top: 40px; }
        .btn { padding: 15px 30px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--slate-900); color: white; }
        .btn-sec { background: #e2e8f0; color: var(--text-main); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="quiz-ui">
        <h1>Speaker Leadership Index</h1>
        <p class="subtitle">A functional diagnostic of your natural presence[cite: 1].</p>
        
        <div id="q-render"></div>

        <div class="nav">
            <button class="btn btn-sec" id="prev" onclick="move(-1)">Back</button>
            <button class="btn btn-main" id="next" onclick="move(1)" disabled>Continue</button>
        </div>
    </div>

    <div id="results-area">
        <div id="pdf-content">
            <div style="text-align: center; margin-bottom: 50px;">
                <h1 style="font-size: 2.5rem;">SLI Performance Report</h1>
                <p style="font-size: 1.2rem; color: #64748b;">Comprehensive Presence Breakdown</p>
                <div id="archetype-box" style="margin-top: 20px; font-size: 1.8rem; font-weight: 800; color: var(--blue-600);"></div>
            </div>
            <div id="pillar-output"></div>
        </div>
        <div class="nav">
            <button class="btn btn-sec" onclick="location.reload()">Restart</button>
            <button class="btn btn-main" onclick="savePDF()">Download Full PDF Report</button>
        </div>
    </div>
</div>

<script>
const scenarios = [
    { p: "Connection", q: "Scenario 1: You step forward. The room is quiet, but attention feels distant.", opts: ["Prepared opening/Message unfold", "Adjust tone/Observe response", "Pause briefly/Bring them in"] },
    { p: "Confidence", q: "Scenario 2: In the middle of speaking, your mind goes blank for a moment.", opts: ["Trust the flow", "Pause/Collect thoughts", "Acknowledge/Rebuild flow"] },
    { p: "Clarity", q: "Scenario 3: Someone asks a question that shifts the direction of your talk.", opts: ["Respond briefly/Return to structure", "Explore/Connect to message", "Allow moment to reshape direction"] },
    { p: "Connection", q: "Scenario 4: You sense they are listening, but not fully engaged.", opts: ["Continue/Trust message", "Adjust delivery to align", "Shift approach to active participation"] },
    { p: "Confidence", q: "Scenario 5: You feel nervous energy rising within you.", opts: ["Continue/Focus on composure", "Slow/Stabilize pace", "Ground yourself fully"] },
    { p: "Clarity", q: "Scenario 6: You realize their needs are different from what you prepared.", opts: ["Continue/Message has value", "Adjust examples", "Reshape message to meet them"] },
    { p: "Connection", q: "Scenario 7: An unexpected reaction emerges from the audience.", opts: ["Stay focused on message", "Acknowledge briefly", "Use moment to deepen engagement"] },
    { p: "Transformation", q: "Scenario 8: Time is running out.", opts: ["Complete what you planned", "Focus on what matters most", "Ensure they leave with something lasting"] },
    { p: "Transformation", q: "Scenario 9: You notice shifts in audience attention.", opts: ["Maintain delivery", "Adjust presence slightly", "Actively guide energy"] },
    { p: "Transformation", q: "Scenario 10: You reach the end of your message.", opts: ["Conclude/Allow reflection", "Reinforce key message", "Close in a way that changes them"] }
];

const insights = {
    "Confidence": { text: "Focuses on your 'inner game'—your ability to remain grounded under pressure [cite: 1, 163].", action: "Transition from 'holding it together' to utilizing nervous energy as a source of stage power." },
    "Clarity": { text: "Measures your ability to stay structured while remaining flexible to the needs of the room[cite: 1, 220].", action: "Stop viewing interruptions as obstacles. Treat them as the 'front door' to deeper clarity[cite: 1, 221]." },
    "Connection": { text: "Assesses how effectively you bridge the gap between yourself and the audience[cite: 1, 161].", action: "Practice 'The Pause.' Before speaking, ensure the audience is mentally present with you." },
    "Transformation": { text: "The highest tier of the SLI. It measures your ability to leave a lasting impact[cite: 1, 116].", action: "Focus on the 'Identity Shift.' Move from giving information to altering how they see their next step[cite: 1, 116]." }
};

let current = 0;
let userScores = new Array(10).fill(null);

function render() {
    const data = scenarios[current];
    document.getElementById('q-render').innerHTML = `
        <span class="scenario-tag">Pillar: ${data.p}</span>
        <div class="question-text">${data.q}</div>
        ${data.opts.map((o, i) => `
            <button class="opt-btn ${userScores[current] === i+1 ? 'selected' : ''}" onclick="select(${i+1})">
                <span class="opt-idx">${String.fromCharCode(65+i)}</span> ${o}
            </button>
        `).join('')}
        <div class="bar-bg"><div class="bar-fill" style="width:${(current+1)*10}%"></div></div>
    `;
    document.getElementById('prev').disabled = current === 0;
    document.getElementById('next').disabled = userScores[current] === null;
    document.getElementById('next').innerText = current === 9 ? "Finish & Analyze" : "Next Scenario";
}

window.select = (v) => { userScores[current] = v; render(); };
window.move = (d) => { if(d===1 && current===9) { showResults(); return; } current += d; render(); };

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    document.getElementById('results-area').style.display = 'block';

    const totals = { Confidence: 0, Clarity: 0, Connection: 0, Transformation: 0 };
    const counts = { Confidence: 0, Clarity: 0, Connection: 0, Transformation: 0 };
    scenarios.forEach((s, i) => { totals[s.p] += userScores[i]; counts[s.p]++; });

    let html = "";
    Object.keys(totals).forEach(p => {
        // Percentage calculation: (Score / Max Possible) * 100
        const pct = Math.round(((totals[p] / (counts[p] * 3)) * 100));
        html += `
            <div class="pillar-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:1.5rem; font-weight:800;">${p} Index</span>
                    <span class="percentage-badge">${pct}%</span>
                </div>
                <div class="bar-bg" style="margin: 15px 0;"><div class="bar-fill" style="width:${pct}%"></div></div>
                <span class="section-label" style="color:#10b981;">Functional Analysis</span>
                <p class="report-body">${insights[p].text}</p>
                <span class="section-label" style="color:#e11d48;">The Strategic Shift</span>
                <p class="report-body">${insights[p].action}</p>
            </div>
        `;
    });
    document.getElementById('pillar-output').innerHTML = html;
    
    const sum = userScores.reduce((a, b) => a + b, 0);
    const arch = sum > 25 ? "Transformational Leader" : sum > 15 ? "Adaptive Communicator" : "Foundation Speaker";
    document.getElementById('archetype-box').innerText = `Your Profile: ${arch}`;
}

function savePDF() {
    const element = document.getElementById('pdf-content');
    const opt = {
        margin: 0.5,
        filename: 'SLI_Percentage_Report.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };
    html2pdf().set(opt).from(element).save();
}

render();
</script>
</body>
</html>
