<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Speaker's Crucible</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
            --bg-gradient: linear-gradient(135deg, #4338ca 0%, #6366f1 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .card {
            background: #ffffff;
            width: 90%;
            max-width: 900px;
            min-height: 500px;
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* Top Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #f1f5f9;
            border-radius: 10px;
            margin-bottom: 40px;
        }

        .progress-fill {
            height: 100%;
            background: #e2e8f0;
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 10px;
        }

        /* Content Area */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .q-type {
            color: var(--primary);
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 30px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #f1f5f9;
            padding: 18px 25px;
            border-radius: 15px;
            cursor: pointer;
            text-align: left;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #f8fafc;
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .letter {
            width: 30px;
            height: 30px;
            background: #f1f5f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-weight: 800;
            color: var(--primary);
        }

        /* Navigation Buttons */
        .nav-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .btn-prev {
            background: #fff;
            border: 2px solid var(--dark);
            color: var(--dark);
        }

        .btn-prev:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .btn-next {
            background: var(--dark);
            border: 2px solid var(--dark);
            color: #fff;
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results */
        #results { display: none; }
        .arch-title { font-size: 3rem; font-weight: 800; margin: 0; color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

    <div class="card">
        <div id="quiz-ui">
            <div class="progress-container">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div class="content-area animate" id="question-container">
                </div>

            <div class="nav-footer">
                <button class="btn btn-prev" id="prev-btn" onclick="prev()">← PREVIOUS</button>
                <button class="btn btn-next" id="next-btn" onclick="next()">NEXT →</button>
            </div>
        </div>

        <div id="results" class="animate">
            <div id="pdf-export">
                <h1 class="arch-title" id="arch-name">The Catalyst</h1>
                <p id="arch-desc" style="font-size: 1.2rem; line-height: 1.6; margin: 20px 0;"></p>
                <div style="background: #f8fafc; padding: 25px; border-radius: 20px;">
                    <h3 style="color: var(--primary); margin-top: 0;">Transformation Protocol</h3>
                    <ul id="arch-tips" style="line-height: 2;"></ul>
                </div>
            </div>
            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="btn btn-next" onclick="savePDF()">Download PDF</button>
                <button class="btn btn-prev" onclick="location.reload()">Restart</button>
            </div>
        </div>
    </div>

<script>
    const questions = [
        { type: "Scenario 1: Technical Failure", q: "The projector dies mid-pitch. The room is silent. You...", a: "Wait for IT. The audience needs to see the visuals for the pitch to work.", b: "Make a joke to stall while trying to recite the slide content from memory.", c: "Step away from the screen, walk closer, and say 'Actually, we don't need these.'" },
        { type: "Scenario 2: Time Pressure", q: "You have 12 minutes for a 45-slide deck. What's the plan?", a: "Speed-talk to ensure every data point is delivered to the record.", b: "Skip to the 10 most important slides and summarize the bullets quickly.", c: "Ignore the slides. Tell one story that illustrates the 'Why' behind the data." },
        { type: "Scenario 3: Conflict", q: "A stakeholder says: 'This approach is a waste of our time.'", a: "Defend with logical facts, data, and research that prove you are right.", b: "Smile politely and offer to 'take it offline' to move on to other questions.", c: "Pause, validate them ('You have concerns'), and ask what worries them most." },
        { type: "The Foundation", q: "How do you start building a high-stakes presentation?", a: "Gathering all critical data and outlining the logic chain.", b: "Designing a powerful opening hook and a memorable closing.", c: "Mapping the emotional shift the audience needs to make." },
        { type: "Recovery", q: "Your mind goes completely blank mid-sentence. You...", a: "Check your notes or click through slides to find your place.", b: "Start riffing on a related tangent until you remember the point.", c: "Admit it: 'I've lost my train of thought. Where were we?'" },
        { type: "Simplicity", q: "Explaining complex tech to non-technical executives.", a: "Use precise industry terms to maintain accuracy and authority.", b: "Use visionary buzzwords and focus on the 'Big Picture' ROI.", c: "Use a simple analogy, even if it ignores some technical nuance." },
        { type: "Energy", q: "Half the room is looking at their phones. You...", a: "Focus on the few people paying attention and finish your script.", b: "Speak louder and use bigger gestures to force their attention back.", c: "Stop the talk. Acknowledge the energy shift and ask a question." },
        { type: "Authenticity", q: "You are sharing a story about a massive failure. You...", a: "Stay behind the podium. Keep the delivery clinical and objective.", b: "Use rehearsed theatrical gestures to emphasize the drama.", c: "Move close to the edge of the stage and speak like a friend." },
        { type: "Composure", q: "A difficult question makes you sweat. Your hands...", a: "Grip the podium or clicker for physical grounding.", b: "Move rapidly—lots of erratic gestures to mask the nerves.", c: "Stay still and open. You use a long pause as a power move." },
        { type: "The Success Metric", q: "You've finished. How do you judge the success?", a: "Did I cover all my material accurately without any errors?", b: "Did they clap loudly and give me high praise afterwards?", c: "Did the audience's body language change? Are they ready to act?" }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);

    function render() {
        const container = document.getElementById('question-container');
        const q = questions[currentIdx];
        
        container.innerHTML = `
            <div class="q-type">${q.type}</div>
            <div class="question-text">${q.q}</div>
            <div class="options-list">
                <button class="option-btn ${userAnswers[currentIdx] === 'A' ? 'selected' : ''}" onclick="saveAnswer('A')"><div class="letter">A</div> ${q.a}</button>
                <button class="option-btn ${userAnswers[currentIdx] === 'B' ? 'selected' : ''}" onclick="saveAnswer('B')"><div class="letter">B</div> ${q.b}</button>
                <button class="option-btn ${userAnswers[currentIdx] === 'C' ? 'selected' : ''}" onclick="saveAnswer('C')"><div class="letter">C</div> ${q.c}</button>
            </div>
        `;

        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
        document.getElementById('prev-btn').disabled = currentIdx === 0;
        
        // Change "Next" to "Finish" on the last question
        const nextBtn = document.getElementById('next-btn');
        if (currentIdx === questions.length - 1) {
            nextBtn.innerText = "Finish Analysis";
        } else {
            nextBtn.innerText = "Next →";
        }
        
        nextBtn.disabled = userAnswers[currentIdx] === null;
    }

    window.saveAnswer = function(choice) {
        userAnswers[currentIdx] = choice;
        render();
    };

    window.next = function() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            render();
        } else {
            showResults();
        }
    };

    window.prev = function() {
        if (currentIdx > 0) {
            currentIdx--;
            render();
        }
    };

    function showResults() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('results').style.display = 'block';

        const scores = { A: 0, B: 0, C: 0 };
        userAnswers.forEach(ans => scores[ans]++);

        let name, desc, tips;
        if (scores.C > scores.A && scores.C > scores.B) {
            name = "The Catalyst";
            desc = "You prioritize audience transformation. You view speaking as an act of service and are willing to be vulnerable to ensure the message lands.";
            tips = ["Add more rigid structure to your next pitch.", "Pair every emotional story with a hard statistic.", "Give direct commands at the end."];
        } else if (scores.B > scores.A) {
            name = "The Performer";
            desc = "You use charisma to win the room, but may be prioritizing 'being liked' over providing 'utility'.";
            tips = ["Practice a talk without moving your feet once.", "Focus on actionable 'How-to' steps.", "Use silence more than jokes."];
        } else {
            name = "The Professor";
            desc = "You prioritize accuracy and data. You use information as a shield to avoid the vulnerability of real connection.";
            tips = ["Delete half your slides.", "Start your next talk with a personal failure.", "Wait 3 seconds after every major point."];
        }

        document.getElementById('arch-name').innerText = name;
        document.getElementById('arch-desc').innerText = desc;
        document.getElementById('arch-tips').innerHTML = tips.map(t => `<li>${t}</li>`).join('');
    }

    window.savePDF = function() {
        const element = document.getElementById('pdf-export');
        html2pdf().from(element).save('My_Masterclass_Analysis.pdf');
    };

    // INITIAL LOAD
    render();
</script>
</body>
</html>
